<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX EXECUTIVE MIAMI</title>
    <style>
        /* Базовые настройки, чтобы ничего не плыло */
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; }

        /* Главный блок с ТВОИМ ФОТО */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('car.jpg'); /* ТВОЁ ФОТО С КОМПЬЮТЕРА */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 { font-size: 3.5rem; text-transform: uppercase; letter-spacing: 5px; color: #d4af37; margin: 0; }

        /* Твои таблички с надписями */
        .badges { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; justify-content: center; }
        .badge { border: 1px solid #d4af37; padding: 10px 20px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

        /* Новые карточки тарифов (без цен) */
        .services { padding: 60px 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 1200px; margin: 0 auto; }
        .card { background: #111; border: 1px solid #222; padding: 30px; width: 300px; text-align: center; border-radius: 10px; }
        .card h3 { color: #d4af37; margin-top: 0; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 25px; background: #d4af37; color: #000; text-decoration: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Onyx Executive</h1>
        <div class="badges">
            <div class="badge">Professional Chauffeur</div>
            <div class="badge">Luxury Suburban RST</div>
            <div class="badge">Miami Area</div>
        </div>
        <a href="https://wa.me/3108579240" class="btn">WhatsApp Booking</a>
    </header>

    <section class="services">
        <div class="card">
            <h3>Hourly</h3>
            <p>Format: By Hour</p>
            <a href="https://wa.me/3108579240" class="btn">Inquire</a>
        </div>
        <div class="card" style="border-color: #d4af37;">
            <h3>Daily</h3>
            <p>Format: Full Day</p>
            <a href="https://wa.me/3108579240" class="btn">Book Now</a>
        </div>
        <div class="card">
            <h3>Weekend</h3>
            <p>Format: Weekend Package</p>
            <a href="https://wa.me/3108579240" class="btn">Get a Quote</a>
        </div>
    </section>

</body>
</html>
