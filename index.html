<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX EXECUTIVE MIAMI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        
        /* Твоё главное фото на весь экран */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://static.wixstatic.com/media/ad4b16_8b89e830e07342898b3f27163f58e478~mv2.jpg'); /* Ссылка на твой Suburban */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 5px; color: #d4af37; margin-bottom: 20px; }

        /* Твои плашки (Badges) */
        .badges { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
        .badge { border: 1px solid #d4af37; padding: 8px 15px; border-radius: 5px; font-size: 0.8rem; text-transform: uppercase; }

        /* Карточки тарифов */
        .services { padding: 60px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1100px; margin: 0 auto; }
        .card { background: #111; padding: 30px; border-radius: 10px; border: 1px solid #222; text-align: center; }
        .card h3 { color: #d4af37; margin-top: 0; }
        .type { display: block; margin: 15px 0; color: #888; font-weight: bold; text-transform: uppercase; }
        
        .btn { display: inline-block; padding: 12px 25px; background: #d4af37; color: #000; text-decoration: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Onyx Executive</h1>
        <div class="badges">
            <div class="badge">Professional Chauffeur</div>
            <div class="badge">Suburban RST</div>
            <div class="badge">Miami Area</div>
        </div>
        <a href="https://wa.me/3108579240" class="btn">Book via WhatsApp</a>
    </section>

    <section class="services">
        <div class="card">
            <h3>Hourly</h3>
            <p>Flexible city travel.</p>
            <span class="type">Format: By Hour</span>
            <a href="https://wa.me/3108579240" class="btn">Inquire</a>
        </div>
        <div class="card" style="border-color: #d4af37;">
            <h3>Daily</h3>
            <p>Full day premium service.</p>
            <span class="type">Format: Per Day</span>
            <a href="https://wa.me/3108579240" class="btn">Book Now</a>
        </div>
        <div class="card">
            <h3>Weekend</h3>
            <p>Perfect for Race Weekend.</p>
            <span class="type">Format: Weekend</span>
            <a href="https://wa.me/3108579240" class="btn">Get a Quote</a>
        </div>
    </section>

</body>
</html>
